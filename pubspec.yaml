name: anime_chat_app
description: A chat app with anime characters using voice synthesis

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP请求
  http: ^1.1.0
  
  audioplayers: ^6.6.0 
  
  # 本地存储 - Windows支持
  shared_preferences: ^2.2.2
  
  # 文件路径 - Windows支持
  path_provider: ^2.1.1

  window_manager: ^0.5.1    # 窗口管理
  image_picker: ^1.0.4      # 图片选择器

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true